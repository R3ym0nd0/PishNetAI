<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#212121">
    <meta name="description" content="PhishNet AI Assistant - Your phishing detection helper">
    <title>PhishNet AI - Assistant</title>
    <link rel="icon" href="assets/images/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/assistant.css">
</head>
<body class="assistant-body">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="assets/images/logo.png" alt="PhishNet Logo" class="logo-img">
                    <div class="logo-text-wrapper">
                        <span class="logo-text">PhishNet AI</span>
                        <span class="logo-subtitle">Kaypian Campus</span>
                    </div>
                </div>
                <button class="sidebar-back-btn" id="sidebarCloseBtn" title="Close menu">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
                    </svg>
                </button>
            </div>

            <button class="new-chat-btn" id="newChatBtn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
                <span>New Chat</span>
            </button>

            <!-- Chat History -->
            <div class="chat-history">
                <h3 class="history-title">Chat History</h3>
                <ul class="chat-list" id="chatList">
                    <!-- Chat history items will be populated dynamically -->
                </ul>
            </div>

            <!-- Quick Prompts (small section) -->
            <section class="quick-prompts-section" id="quickPromptsSection">
                <h3 class="history-title">Quick Prompts</h3>
                <div class="quick-prompts-grid">
                    <button type="button" class="prompt-btn assistant-prompt" data-prompt="Can you analyze this suspicious URL for phishing?">
                        Analyze URL
                    </button>
                    <button type="button" class="prompt-btn assistant-prompt" data-prompt="What signs should I check before logging into a website?">
                        Safety Check
                    </button>
                    <button type="button" class="prompt-btn assistant-prompt" data-prompt="I clicked a suspicious link. What should I do next?">
                        After Clicking
                    </button>
                </div>
            </section>

            <div class="sidebar-footer">
                <a href="login.html" class="auth-btn signup">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    <span>Sign In</span>
                </a>
                <a href="signup.html" class="auth-btn signin">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    <span>Sign Up</span>
                </a>
            </div>
        </aside>

        <!-- Mobile Overlay -->
        <div class="mobile-overlay" id="mobileOverlay"></div>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="header-left">
                    <button class="menu-toggle-btn" id="menuToggleBtn" title="Toggle menu">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                        </svg>
                    </button>
                    <h1 class="chat-title">New Chat</h1>
                </div>
                <div class="header-right">
                    <a href="../index.html" class="header-btn" title="Go to home">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                        </svg>
                    </a>
                </div>
            </header>

            <!-- Chat Section - matches assistant.js requirements -->
            <section class="assistant-chat panel" id="assistantChat">
                <div class="chat-messages ai-messages assistant-messages" id="aiMessagesFull" role="log" aria-live="polite">
                </div>

                <form id="aiFormFull" class="ai-form assistant-form" autocomplete="off">
                    <div class="form-input-wrapper">
                        <textarea 
                            id="aiInputFull" 
                            class="chat-input" 
                            placeholder="Ask about phishing"
                            rows="1"
                            aria-label="Ask the assistant"
                        ></textarea>
                        <button type="submit" class="send-btn" title="Send message">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">PhishNet AI may produce inaccurate information. Consider verifying important information.</p>
                </form>
            </section>
        </main>
    </div>

    <script type="module" src="assets/js/assistant.js"></script>
</body>
</html>
